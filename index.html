<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Wash Luxury</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      :root {
        /* Default Premium (Gold) - Updated to #ffd633 */
        --primary-r: 255;
        --primary-g: 214;
        --primary-b: 51;
        --primary-dim: #b39624;
        --gradient-start: #ffd633;
        --gradient-end: #e6c229;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary:
                "rgb(var(--primary-r) var(--primary-g) var(--primary-b) / <alpha-value>)",
              "primary-dim": "var(--primary-dim)",
              onyx: "#09090b", // Deep Black/Grey
              "onyx-light": "#18181b", // Slightly lighter for cards
              alabaster: "#f8f7f6", // Off-white
              "background-dark": "#0f0f0f",
              "surface-dark": "#1a1a1a",
              "card-dark": "#121212",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              display: ["Inter", "sans-serif"],
            },
            backgroundImage: {
              "gold-gradient":
                "linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%)",
              "onyx-gradient":
                "linear-gradient(135deg, #18181b 0%, #09090b 100%)",
            },
            animation: {
              "pulse-slow": "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
              shimmer: "shimmer 2s infinite",
            },
            keyframes: {
              shimmer: {
                "0%": { transform: "translateX(-150%) skewX(-20deg)" },
                "100%": { transform: "translateX(150%) skewX(-20deg)" },
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }

      /* Smooth Popup Animations */
      @keyframes slideUp {
        from {
          transform: translateY(100%);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .slide-up-enter {
        animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        will-change: transform, opacity;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .fade-in-enter {
        animation: fadeIn 0.4s ease-out forwards;
      }

      /* Infinite Horizontal Scroll */
      @keyframes scrollX {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      .animate-scroll {
        animation: scrollX 25s linear infinite;
        width: max-content;
      }
      .animate-scroll:hover {
        animation-play-state: paused;
      }

      /* Pulse subtle animation for buttons */
      @keyframes pulse-subtle {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      .group-hover\:animate-pulse-subtle:hover {
        animation: pulse-subtle 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
      }

      /* Drop animation for water droplets */
      @keyframes drop {
        0% {
          transform: translateY(-10px);
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        70% {
          opacity: 1;
        }
        100% {
          transform: translateY(12px);
          opacity: 0;
        }
      }
      .animate-droplet-1 {
        animation: drop 1.5s infinite linear;
      }
      .animate-droplet-2 {
        animation: drop 1.5s infinite linear;
        animation-delay: 0.5s;
      }
      .animate-droplet-3 {
        animation: drop 1.5s infinite linear;
        animation-delay: 1s;
      }

      /* Rise animation for steam */
      @keyframes rise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        20% {
          opacity: 0.7;
        }
        80% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(-18px) scale(1.3);
          opacity: 0;
        }
      }
      .animate-steam-1 {
        animation: rise 2s infinite ease-out;
      }
      .animate-steam-2 {
        animation: rise 2s infinite ease-out;
        animation-delay: 0.6s;
      }
      .animate-steam-3 {
        animation: rise 2s infinite ease-out;
        animation-delay: 1.2s;
      }

      /* Wave ripple animation for water tank */
      @keyframes wave {
        0%,
        100% {
          transform: scaleX(1) translateY(0);
        }
        50% {
          transform: scaleX(1.1) translateY(-2px);
        }
      }
      .animate-ripple {
        animation: wave 2s infinite ease-in-out;
        transform-origin: center;
      }
      .animate-ripple-2 {
        animation: wave 2s infinite ease-in-out;
        animation-delay: 0.5s;
        transform-origin: center;
      }

      /* Sparkle animation for Sofa Cleaning */
      @keyframes sparkle {
        0%,
        100% {
          transform: scale(0) rotate(0deg);
          opacity: 0;
        }
        50% {
          transform: scale(1) rotate(45deg);
          opacity: 1;
        }
      }
      .animate-sparkle-1 {
        animation: sparkle 2s infinite ease-in-out;
        transform-origin: center;
      }
      .animate-sparkle-2 {
        animation: sparkle 2s infinite ease-in-out;
        animation-delay: 0.7s;
        transform-origin: center;
      }
      .animate-sparkle-3 {
        animation: sparkle 2s infinite ease-in-out;
        animation-delay: 1.4s;
        transform-origin: center;
      }

      /* Slide animation for Car Wash shimmer */
      @keyframes slide {
        0% {
          transform: translateX(-40px) skewX(-20deg);
          opacity: 0;
        }
        20% {
          opacity: 0.6;
        }
        80% {
          opacity: 0.6;
        }
        100% {
          transform: translateX(40px) skewX(-20deg);
          opacity: 0;
        }
      }
      .animate-shimmer-1 {
        animation: slide 2s infinite ease-out;
      }
      .animate-shimmer-2 {
        animation: slide 2s infinite ease-out;
        animation-delay: 0.6s;
      }
      .animate-shimmer-3 {
        animation: slide 2s infinite ease-out;
        animation-delay: 1.2s;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react/": "https://esm.sh/react@^19.2.4/",
          "react": "https://esm.sh/react@^19.2.4",
          "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
        }
      }
    </script>
  </head>
  <body
    class="bg-alabaster dark:bg-black text-onyx dark:text-alabaster font-display antialiased selection:bg-primary selection:text-onyx h-full transition-colors duration-300"
  >
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
