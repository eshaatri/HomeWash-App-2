<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitchen Cleaning Nano Banana – v4 Table Top & Chimney</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          "Outfit",
          -apple-system,
          sans-serif;
        background: radial-gradient(
          circle at 50% 10%,
          #fdfdfd 0%,
          #edf1f7 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        color: #1e293b;
      }

      .header-text {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }

      .sub {
        font-size: 1rem;
        color: #64748b;
        max-width: 450px;
        line-height: 1.6;
      }

      /* —— Banana Button "Minimal_Kitchen_Cleaning" (v4 Teal) —— */
      .banana-btn {
        --brand-color: #009a9a;
        --accent-glow: #ffd54f;

        width: 180px;
        height: 180px;
        border-radius: 34px;
        background: radial-gradient(
          circle at 50% 50%,
          #ffffff 0%,
          #fdfdfd 100%
        );
        border: 2.5px solid var(--brand-color);
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: all 0.3s ease;
        outline: none;
        overflow: hidden;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
      }

      .banana-btn:hover {
        box-shadow: 0 8px 25px rgba(0, 154, 154, 0.3);
      }

      .banana-btn:active {
        transform: scale(0.97);
        transition-duration: 0.15s;
      }

      /* Banana Layer "Focus_Accent" */
      .focus-accent {
        position: absolute;
        width: 100px;
        height: 100px;
        background: var(--accent-glow);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(50px);
        opacity: 0.12;
        pointer-events: none;
        transition: all 0.5s ease;
        z-index: 0;
      }

      .banana-btn:hover .focus-accent {
        width: 120px;
        height: 120px;
        filter: blur(60px);
        opacity: 0.22;
      }

      /* Banana Group "Visual_Hero" */
      .visual-hero {
        position: relative;
        width: 85%;
        height: 85%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1;
      }

      .banana-btn:hover .visual-hero {
        transform: scale(1.05);
      }

      /* Rising Steam Animation */
      @keyframes rise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        20% {
          opacity: 0.7;
        }
        80% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(-18px) scale(1.3);
          opacity: 0;
        }
      }

      .steam {
        animation: rise 2s infinite ease-out;
      }
      .steam-1 {
        animation-delay: 0s;
      }
      .steam-2 {
        animation-delay: 0.6s;
      }
      .steam-3 {
        animation-delay: 1.2s;
      }

      /* Banana Icon "Art_Kitchen" (Symmetrical Tabletop + Chimney Hero) */
      .art-kitchen {
        width: 100%;
        height: auto;
        max-width: 115px;
        filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.1));
        transition: filter 0.5s ease;
      }

      .art-kitchen svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .banana-btn:hover .art-kitchen {
        filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.15));
      }
    </style>
  </head>
  <body>
    <div class="header-text">
      <h1>Kitchen Cleaning</h1>
      <p class="sub">
        Nano Banana v4 – Premium Kitchen Hero: Symmetrical tabletop stove with
        an overhead chimney and animated steam.
      </p>
    </div>

    <button type="button" class="banana-btn" aria-label="Book Kitchen Cleaning">
      <!-- 1. Differentiation Accent -->
      <div class="focus-accent"></div>

      <!-- 2. The Enlarged Visual Hero -->
      <div class="visual-hero">
        <!-- Symmetrical_Kitchen_Hero_v2 -->
        <div class="art-kitchen" aria-hidden="true">
          <svg
            viewBox="0 0 64 64"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="gradChimney"
                x1="20"
                y1="4"
                x2="44"
                y2="18"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#7BE0E0" />
                <stop offset="1" stop-color="#009a9a" />
              </linearGradient>
              <linearGradient
                id="gradCounter"
                x1="8"
                y1="48"
                x2="56"
                y2="52"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#FDFDFD" />
                <stop offset="1" stop-color="#E2E8F0" />
              </linearGradient>
              <linearGradient
                id="gradPot"
                x1="20"
                y1="28"
                x2="44"
                y2="42"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#7BE0E0" />
                <stop offset="1" stop-color="#009a9a" />
              </linearGradient>
            </defs>

            {/* Symmetrical Table Top / Counter (Base) */}
            <path
              d="M4 48 H60 V56 H4 Z"
              fill="url(#gradCounter)"
              stroke="#009a9a"
              stroke-width="0.5"
              opacity="0.8"
            />
            <path d="M8 48 H56 V50 H8 Z" fill="#009a9a" opacity="0.1" />

            {/* Symmetrical Chimney / Range Hood (Top) */}
            <path d="M18 4 H46 L42 18 H22 L18 4 Z" fill="url(#gradChimney)" />
            <path d="M22 18 H42 V20 H22 V18 Z" fill="#009a9a" opacity="0.5" />

            {/* Symmetrical Cooking Pot on the Stove */}
            <rect
              x="22"
              y="34"
              width="20"
              height="14"
              rx="3"
              fill="url(#gradPot)"
            />
            <path d="M22 34 H42 L40 32 H24 L22 34 Z" fill="#F4511E" />
            {/* Pot Rim */} {/* Symmetrical Knobs on Counter edge */}
            <circle cx="20" cy="52" r="2" fill="#009a9a" opacity="0.4" />
            <circle cx="44" cy="52" r="2" fill="#009a9a" opacity="0.4" />
            <circle cx="32" cy="52" r="2" fill="#009a9a" opacity="0.6" />

            {/* Animated Steam rising towards the Chimney */}
            <g class="steam steam-1">
              <path
                d="M28 26 Q30 22 32 26 T36 26"
                stroke="#FFFFFF"
                stroke-opacity="0.8"
                stroke-width="2"
                stroke-linecap="round"
                fill="none"
              />
            </g>
            <g class="steam steam-2">
              <path
                d="M24 22 Q26 18 28 22 T32 22"
                stroke="#FFFFFF"
                stroke-opacity="0.5"
                stroke-width="2"
                stroke-linecap="round"
                fill="none"
              />
            </g>
            <g class="steam steam-3">
              <path
                d="M32 22 Q34 18 36 22 T40 22"
                stroke="#FFFFFF"
                stroke-opacity="0.5"
                stroke-width="2"
                stroke-linecap="round"
                fill="none"
              />
            </g>

            {/* Subtle Reflection on Pot */}
            <rect
              x="25"
              y="38"
              width="14"
              height="1.5"
              rx="0.75"
              fill="#FFFFFF"
              opacity="0.2"
            />
          </svg>
        </div>
      </div>
    </button>
  </body>
</html>
