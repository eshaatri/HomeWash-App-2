<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bathroom Cleaning Nano Banana – v4 Orange Theme</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          "Outfit",
          -apple-system,
          sans-serif;
        background: radial-gradient(
          circle at 50% 10%,
          #fdfdfd 0%,
          #edf1f7 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        color: #1e293b;
      }

      .header-text {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }

      .sub {
        font-size: 1rem;
        color: #64748b;
        max-width: 450px;
        line-height: 1.6;
      }

      /* —— Banana Button "Minimal_Bathroom_Cleaning" (v4 Orange) —— */
      .banana-btn {
        --brand-color: #ff7043; /* Unified Orange Theme */
        --accent-glow: #7e57c2; /* Purple Glow Secondary */

        width: 180px;
        height: 180px;
        border-radius: 34px;
        background: radial-gradient(
          circle at 50% 50%,
          #ffffff 0%,
          #fdfdfd 100%
        );
        border: 2.5px solid var(--brand-color);
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: all 0.3s ease;
        outline: none;
        overflow: hidden;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Hover State: Button glow */
      .banana-btn:hover {
        box-shadow: 0 8px 25px rgba(255, 112, 67, 0.3);
      }

      .banana-btn:active {
        transform: scale(0.97);
        transition-duration: 0.15s;
      }

      /* Banana Layer "Focus_Accent" */
      .focus-accent {
        position: absolute;
        width: 100px;
        height: 100px;
        background: var(--accent-glow);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(50px);
        opacity: 0.1;
        pointer-events: none;
        transition: all 0.5s ease;
        z-index: 0;
      }

      .banana-btn:hover .focus-accent {
        width: 120px;
        height: 120px;
        filter: blur(60px);
        opacity: 0.2;
      }

      /* Banana Group "Visual_Hero" */
      .visual-hero {
        position: relative;
        width: 85%;
        height: 85%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1;
      }

      /* Pulse scale for the hero group */
      .banana-btn:hover .visual-hero {
        transform: scale(1.05);
      }

      /* Animation specifically for dropping droplets */
      @keyframes drop {
        0% {
          transform: translateY(-10px);
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        70% {
          opacity: 1;
        }
        100% {
          transform: translateY(12px);
          opacity: 0;
        }
      }

      .droplet {
        animation: drop 1.5s infinite linear;
      }
      .droplet-1 {
        animation-delay: 0s;
      }
      .droplet-2 {
        animation-delay: 0.5s;
      }
      .droplet-3 {
        animation-delay: 1s;
      }

      /* Banana Icon "Art_Bathroom" */
      .art-bathroom {
        width: 100%;
        height: auto;
        max-width: 110px;
        filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.1));
        transition: filter 0.5s ease;
      }

      .art-bathroom svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .banana-btn:hover .art-bathroom {
        filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.15));
      }
    </style>
  </head>
  <body>
    <div class="header-text">
      <h1>Bathroom Cleaning</h1>
      <p class="sub">
        Nano Banana v4 – Orange Bathroom Cleaning: Unified orange theme with
        animated blue droplets for clear recognition.
      </p>
    </div>

    <button
      type="button"
      class="banana-btn"
      aria-label="Book Bathroom Cleaning"
    >
      <!-- 1. Differentiation Accent -->
      <div class="focus-accent"></div>

      <!-- 2. The Enlarged Visual Hero -->
      <div class="visual-hero">
        <!-- Symmetrical_Bathtub_Hero -->
        <div class="art-bathroom" aria-hidden="true">
          <svg
            viewBox="0 0 64 64"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="gradTub"
                x1="8"
                y1="36"
                x2="56"
                y2="56"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#FFAB91" />
                <stop offset="1" stop-color="#FF7043" />
              </linearGradient>
              <linearGradient
                id="gradWater"
                x1="12"
                y1="36"
                x2="52"
                y2="44"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#80DEEA" />
                <stop offset="1" stop-color="#4DD0E1" />
              </linearGradient>
            </defs>

            <!-- The Bathtub Rim (Symmetrical) -->
            <path
              d="M8 36 C8 32 12 32 14 32 H50 C52 32 56 32 56 36 V48 C56 52 52 56 48 56 H16 C12 56 8 52 8 48 V36 Z"
              fill="url(#gradTub)"
            />

            <!-- The Water Surface -->
            <path
              d="M14 38 H50 V42 H14 Z"
              fill="url(#gradWater)"
              opacity="0.6"
            />

            <!-- Symmetrical Faucet Head -->
            <path d="M24 12 H40 V16 H24 Z" fill="#FF7043" />

            <!-- Animated Droplets (Blue Contrast) -->
            <g class="droplet droplet-1">
              <circle cx="32" cy="18" r="1.5" fill="#4DD0E1" />
            </g>
            <g class="droplet droplet-2">
              <circle cx="28" cy="22" r="1.5" fill="#4DD0E1" />
            </g>
            <g class="droplet droplet-3">
              <circle cx="36" cy="22" r="1.5" fill="#4DD0E1" />
            </g>

            <!-- Subtle Shine -->
            <rect
              x="14"
              y="48"
              width="12"
              height="2"
              rx="1"
              fill="#FFFFFF"
              opacity="0.3"
            />
            <rect
              x="38"
              y="48"
              width="12"
              height="2"
              rx="1"
              fill="#FFFFFF"
              opacity="0.3"
            />
          </svg>
        </div>
      </div>
    </button>
  </body>
</html>
