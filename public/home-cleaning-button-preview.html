<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Cleaning Nano Banana – v4 Definition</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          "Outfit",
          -apple-system,
          sans-serif;
        background: radial-gradient(
          circle at 50% 10%,
          #fdfdfd 0%,
          #edf1f7 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        color: #1e293b;
      }

      .header-text {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }

      .sub {
        font-size: 1rem;
        color: #64748b;
        max-width: 450px;
        line-height: 1.6;
      }

      /* —— Banana Button "Minimal_Home_Cleaning" (Teal) —— */
      .banana-btn {
        width: 180px;
        height: 180px;
        border-radius: 34px; /* More premium rounding */
        background: radial-gradient(
          circle at 50% 50%,
          #ffffff 0%,
          #fdfdfd 100%
        );
        border: 2.5px solid #009a9a; /* Teal Brand */
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: all 0.3s ease;
        outline: none;
        overflow: hidden;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* Hover State: Button glow */
      .banana-btn:hover {
        /* Distinct glow based on Shadow(8px, #009a9a, 30%) */
        box-shadow: 0 8px 25px rgba(0, 154, 154, 0.3);
      }

      .banana-btn:active {
        transform: scale(0.97);
        transition-duration: 0.15s;
      }

      /* Banana Layer "Focus_Accent" */
      .focus-accent {
        position: absolute;
        width: 100px;
        height: 100px;
        background: #7e57c2;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(50px);
        opacity: 0.1;
        pointer-events: none;
        transition: all 0.5s ease;
        z-index: 0;
      }

      .banana-btn:hover .focus-accent {
        width: 120px;
        height: 120px;
        filter: blur(60px);
        opacity: 0.2;
      }

      /* Banana Group "Visual_Hero" */
      .visual-hero {
        position: relative;
        width: 85%; /* Increased from 75% to make the house prominent */
        height: 85%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1;
      }

      .banana-btn:hover .visual-hero {
        transform: scale(1.05); /* Pulse scale */
      }

      /* Banana Icon "Art_House" (Home_Modern_Isometric_Hero) */
      .art-house {
        width: 100%;
        height: auto;
        max-width: 110px; /* Keep it nicely constrained but large */
        /* Floating 3D shadow: Shadow(15px, #000000, 15%) */
        filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.15));
        transition: filter 0.5s ease;
      }

      .art-house svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .banana-btn:hover .art-house {
        filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.2));
      }
    </style>
  </head>
  <body>
    <div class="header-text">
      <h1>Home Cleaning</h1>
      <p class="sub">
        Nano Banana v4 – Minimal Home Cleaning: Enlarged isometric hero house,
        sleek purple focus accent, and elegant interaction pulse.
      </p>
    </div>

    <button type="button" class="banana-btn" aria-label="Book Home Cleaning">
      <!-- 1. Differentiation Accent -->
      <div class="focus-accent"></div>

      <!-- 2. The Enlarged Visual Hero -->
      <div class="visual-hero">
        <!-- Home_Modern_Isometric_Hero -->
        <div class="art-house" aria-hidden="true">
          <svg
            viewBox="0 0 64 64"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="gradRoof"
                x1="8"
                y1="12"
                x2="56"
                y2="34"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#7BE0E0" />
                <stop offset="1" stop-color="#009a9a" />
              </linearGradient>
              <linearGradient
                id="gradBody"
                x1="16"
                y1="32"
                x2="48"
                y2="54"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#FF8A65" />
                <stop offset="1" stop-color="#F4511E" />
              </linearGradient>
            </defs>

            <!-- Main House Body (Flat Base) -->
            <path d="M16 32 H48 V54 H16 Z" fill="url(#gradBody)" />

            <!-- Centered Door Cutout -->
            <path d="M28 42 H36 V54 H28 Z" fill="#FFFFFF" opacity="0.3" />

            <!-- Symmetrical Windows -->
            <rect
              x="20"
              y="36"
              width="6"
              height="6"
              fill="#FFFFFF"
              opacity="0.4"
            />
            <rect
              x="38"
              y="36"
              width="6"
              height="6"
              fill="#FFFFFF"
              opacity="0.4"
            />

            <!-- Classic Pitched Roof with Overhang -->
            <path d="M8 32 L32 8 L56 32 Z" fill="url(#gradRoof)" />

            <!-- Subtle Roof Detail (Right Shade) -->
            <path d="M32 8 L56 32 H32 Z" fill="#000000" opacity="0.08" />
          </svg>
        </div>
      </div>
    </button>
  </body>
</html>
