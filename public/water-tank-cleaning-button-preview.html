<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Tank Cleaning Nano Banana – v4 Orange Theme</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          "Outfit",
          -apple-system,
          sans-serif;
        background: radial-gradient(
          circle at 50% 10%,
          #fdfdfd 0%,
          #edf1f7 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        margin: 0;
        color: #1e293b;
      }

      .header-text {
        text-align: center;
        margin-bottom: 3.5rem;
      }

      h1 {
        font-size: 2.2rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
        line-height: 1.2;
      }

      .sub {
        font-size: 1rem;
        color: #64748b;
        max-width: 450px;
        line-height: 1.6;
      }

      /* —— Banana Button "Minimal_WaterTank_Cleaning" (v4 Orange) —— */
      .banana-btn {
        --brand-color: #ff7043;
        --accent-glow: #0288d1; /* Deep Blue Secondary Glow for Water Tank */

        width: 180px;
        height: 180px;
        border-radius: 34px;
        background: radial-gradient(
          circle at 50% 50%,
          #ffffff 0%,
          #fdfdfd 100%
        );
        border: 2.5px solid var(--brand-color);
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: all 0.3s ease;
        outline: none;
        overflow: hidden;
        box-shadow: none;
        -webkit-tap-highlight-color: transparent;
      }

      .banana-btn:hover {
        box-shadow: 0 8px 25px rgba(255, 112, 67, 0.3);
      }

      .banana-btn:active {
        transform: scale(0.97);
        transition-duration: 0.15s;
      }

      /* Banana Layer "Focus_Accent" (Deep Blue Glow) */
      .focus-accent {
        position: absolute;
        width: 100px;
        height: 100px;
        background: var(--accent-glow);
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        filter: blur(50px);
        opacity: 0.1;
        pointer-events: none;
        transition: all 0.5s ease;
        z-index: 0;
      }

      .banana-btn:hover .focus-accent {
        width: 120px;
        height: 120px;
        filter: blur(60px);
        opacity: 0.2;
      }

      /* Banana Group "Visual_Hero" */
      .visual-hero {
        position: relative;
        width: 85%;
        height: 85%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1;
      }

      .banana-btn:hover .visual-hero {
        transform: scale(1.05); /* Pulse effect */
      }

      /* Rippling / Wave Animation */
      @keyframes wave {
        0%,
        100% {
          transform: scaleX(1) translateY(0);
        }
        50% {
          transform: scaleX(1.1) translateY(-2px);
        }
      }

      .ripple {
        animation: wave 2s infinite ease-in-out;
        transform-origin: center;
      }
      .ripple-2 {
        animation-delay: 0.5s;
        opacity: 0.4;
      }

      /* Banana Icon "Art_WaterTank" (Symmetrical Industrial Tank Hero) */
      .art-watertank {
        width: 100%;
        height: auto;
        max-width: 100px;
        filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.1));
        transition: filter 0.5s ease;
      }

      .art-watertank svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .banana-btn:hover .art-watertank {
        filter: drop-shadow(0 20px 20px rgba(0, 0, 0, 0.15));
      }
    </style>
  </head>
  <body>
    <div class="header-text">
      <h1>Water Tank Cleaning</h1>
      <p class="sub">
        Nano Banana v4 – Orange Water Tank: Symmetrical industrial tank with
        rippling water highlight and deep blue focus accent.
      </p>
    </div>

    <button
      type="button"
      class="banana-btn"
      aria-label="Book Water Tank Cleaning"
    >
      <!-- 1. Differentiation Accent -->
      <div class="focus-accent"></div>

      <!-- 2. The Enlarged Visual Hero -->
      <div class="visual-hero">
        <!-- Symmetrical_WaterTank_Hero -->
        <div class="art-watertank" aria-hidden="true">
          <svg
            viewBox="0 0 64 64"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient
                id="gradTank"
                x1="12"
                y1="16"
                x2="52"
                y2="52"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#FFAB91" />
                <stop offset="1" stop-color="#FF7043" />
              </linearGradient>
              <linearGradient
                id="gradWave"
                x1="16"
                y1="36"
                x2="48"
                y2="48"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#0288D1" />
                <stop offset="1" stop-color="#03A9F4" />
              </linearGradient>
            </defs>

            {/* Symmetrical Tank Main Body (Cylinder) */}
            <path
              d="M16 16 C16 12 48 12 48 16 V52 C48 56 16 56 16 52 V16 Z"
              fill="url(#gradTank)"
            />

            {/* Symmetrical Tank Lid */}
            <rect x="24" y="10" width="16" height="4" rx="2" fill="#F4511E" />

            {/* Tank Ribs (Details) */}
            <path
              d="M16 26 H48"
              stroke="#FFFFFF"
              stroke-opacity="0.2"
              stroke-width="2"
            />
            <path
              d="M16 38 H48"
              stroke="#FFFFFF"
              stroke-opacity="0.2"
              stroke-width="2"
            />

            {/* Symmetrical Rippling Water Highlight (Blue Contrast) */}
            <g class="ripple">
              <ellipse
                cx="32"
                cy="46"
                rx="16"
                ry="4"
                fill="url(#gradWave)"
                opacity="0.6"
              />
            </g>
            <g class="ripple ripple-2">
              <ellipse
                cx="32"
                cy="48"
                rx="12"
                ry="3"
                fill="#FFFFFF"
                opacity="0.2"
              />
            </g>

            {/* Symmetrical Outlet Pipe representation at bottom */}
            <rect x="30" y="54" width="4" height="4" fill="#FF7043" />
          </svg>
        </div>
      </div>
    </button>
  </body>
</html>
